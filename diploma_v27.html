* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #f5f0eb;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px;
  color: #2a2a2a;
}

h1 {
  font-family: 'Charm', cursive;
  font-size: 2rem;
  color: #D0A86D;
  margin-bottom: 8px;
  text-align: center;
}

.subtitle {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 32px;
  text-align: center;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.app {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1800px;
  align-items: flex-start;
}

.form-panel {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  width: 360px;
  min-width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  position: sticky;
  top: 32px;
}

.form-panel h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 24px;
  color: #392C2A;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.field-group { margin-bottom: 16px; }

.field-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.field-group input,
.field-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e0d9d3;
  border-radius: 8px;
  font-size: 0.95rem;
  color: #392C2A;
  background: #faf8f5;
  transition: border-color 0.2s;
  outline: none;
}

.field-group input:focus,
.field-group select:focus { border-color: #D0A86D; }

.field-row { display: flex; gap: 12px; }
.field-row .field-group { flex: 1; }

.divider {
  border: none;
  border-top: 1.5px solid #f0ebe4;
  margin: 20px 0;
}

.btn-fill {
  width: 100%;
  padding: 16px;
  background: #D0A86D;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
}

.btn-fill:hover { background: #b8904f; }
.btn-fill:active { transform: scale(0.90); }
.btn-fill:disabled { background: #ccc; cursor: not-allowed; }

.warning {
  margin-top: 12px;
  font-size: 0.75rem;
  color: #aaa;
  text-align: center;
}

.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: row;
  gap: 8px;
  align-items: flex-start;
  flex-wrap: nowrap;
  overflow-x: auto;
}

.diploma-wrap {
  position: relative;
  transform: scale(0.90);
  transform-origin: top left;
  display: inline-block;
  line-height: 0;
  margin-right: -64px;
  margin-bottom: -80px;
}

.diploma-wrap img {
  display: block;
  width: 640px;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.diploma-layer {
  position: absolute;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.35;
}

/* ===== ПРАВАЯ страница (Диплом) ===== */
#r-status {
  left: 42px; top: 317px;
  font-family: 'Inter', sans-serif;
  font-size: 18px; font-weight: 400;
  letter-spacing: 0.04em;
  color: #4E494D;
  width: 520px;
}

function updatePreview() {
  const profile  = document.getElementById('f-profile').value;
  const degree   = document.getElementById('f-degree').value;
  const _statusRaw = document.getElementById('f-status').value;
  const _autoStatus = degree === 'I' ? 'победитель' : (degree === 'II' || degree === 'III') ? 'призёр' : '';
  const status = _statusRaw || _autoStatus;
  const family   = document.getElementById('f-family').value;
  const name     = document.getElementById('f-name').value;
  const patronym = document.getElementById('f-patronym').value;
  const klass    = document.getElementById('f-klass').value;

  if (profile && PROFILES[profile]) {
    const p = PROFILES[profile];
    // Профиль — объединяем p1 и p2 в одну строку (всё в одном блоке, CAPS через CSS)
    document.getElementById('l-profile').textContent = [p.p1, p.p2].filter(Boolean).join(' ');
    document.getElementById('l-gruppa').textContent  = p.gruppa;
    document.getElementById('l-uroven').textContent  = p.uroven;
    document.getElementById('r-orgs').textContent    = p.orgs;
  } else {
    document.getElementById('l-profile').textContent = '';
    document.getElementById('l-gruppa').textContent  = '';
    document.getElementById('l-uroven').textContent  = '';
    document.getElementById('r-orgs').textContent    = '';
  }

  document.getElementById('r-status').textContent      = status;
  
  document.getElementById('r-degree-num').textContent  = degree;
  document.getElementById('r-family').textContent      = family;
  document.getElementById('r-name').textContent        = name;
  document.getElementById('r-patronym').textContent    = patronym;
  document.getElementById('r-klass').textContent = klass;
}

async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const btn = document.getElementById('btn-pdf');
  btn.textContent = '⏳ Генерация...';
  btn.disabled = true;

  try {
    const pages = ['page-left', 'page-right'];
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (let i = 0; i < pages.length; i++) {
      const el = document.getElementById(pages[i]);
      const canvas = await html2canvas(el, { scale: 3, useCORS: true, backgroundColor: null, logging: false });
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdfW = pdf.internal.pageSize.getWidth();
      const pdfH = pdf.internal.pageSize.getHeight();
      const canvasW = canvas.width / 3 * 0.264583;
      const canvasH = canvas.height / 3 * 0.264583;
      const ratio = Math.min(pdfW / canvasW, pdfH / canvasH);
      const imgW = canvasW * ratio;
      const imgH = canvasH * ratio;
      const x = (pdfW - imgW) / 2;
      const y = (pdfH - imgH) / 2;
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', x, y, imgW, imgH);
    }

    const family = document.getElementById('f-family').value || 'diplom';
    const profile = document.getElementById('f-profile').value || '';
    pdf.save(`diplom_${family}_${profile}.pdf`);
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }

  btn.textContent = '⬇ Скачать PDF';
  btn.disabled = false;
}
